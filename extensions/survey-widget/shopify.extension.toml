# Theme extensions don't need nested [[extensions]] definitions.
# Having them can cause Shopify CLI to treat it as a different extension
# (e.g. creating "survey-widget-2" and removing the original).

[[extensions.files]]
path = "assets/*"

[[extensions.files]]
path = "blocks/*.liquid"

[[extensions.files]]
path = "snippets/*.liquid"
